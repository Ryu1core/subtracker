spring.datasource.url=jdbc:postgresql://localhost:5432/subtrack
spring.datasource.username=postgres
spring.datasource.password=YOUR_POSTGRES_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=RANDOM_64_CHARS_SECRET_GENERATE_YOUR_OWN

# Mail (Gmail SMTP). Use an App Password (16 chars), NOT your regular password!
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD_16_CHARS
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true